version: 2

sources:
  - name: db_silver        
    schema: public         
    tables:
      - name: ecommerce_data
        description: "Bảng chứa dữ liệu đã được làm sạch và chuẩn hóa từ tầng Silver"
        columns:
          - name: event_time
            tests:
              - not_null
          - name: event_type
            tests:
              - not_null
          - name: user_id
            tests:
              - not_null
          - name: product_id
            tests:
              - not_null
          - name: price
            tests:
              - not_null
              
      - name: exchange_rates
        description: "Bảng chứa dữ liệu tỷ giá đã được làm sạch và chuẩn hóa từ tầng Silver"

models:
  - name: dim_users
    description: "Bảng Dimension chứa thông tin khách hàng"
    columns:
      - name: user_id
        description: "ID duy nhất của khách hàng"
        tests:
          - unique
          - not_null

  - name: dim_products
    description: "Bảng Dimension chứa thông tin sản phẩm"
    columns:
      - name: product_id
        description: "ID duy nhất của sản phẩm"
        tests:
          - unique
          - not_null

  - name: fact_sales
    description: "Bảng Fact chứa các giao dịch mua hàng"
    columns:
      - name: sale_id
        description: "ID duy nhất của giao dịch mua hàng"
        tests:
          - unique
          - not_null
      - name: price
        description: "Giá sản phẩm lúc mua"
        tests:
          - not_null